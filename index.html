<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle at top,#0a0f14,#000);
    color:#00ffee;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* HUD */
#hud{
    padding:8px;
    font-size:14px;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid #00ffee;
    text-shadow:0 0 8px #00ffee;
}

/* 主体 */
#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

#sidebar,#rightbar{
    width:260px;
    padding:15px;
    backdrop-filter:blur(8px);
    background:rgba(0,255,255,0.03);
    border-right:1px solid #00ffee22;
    overflow-y:auto;
}

#rightbar{
    border-left:1px solid #00ffee22;
    border-right:none;
}

#content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

/* 回合 */
.turn{
    margin-bottom:25px;
    border-left:4px solid #00ffee;
    padding-left:12px;
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

/* 能量条 */
.bar-container{
    width:100%;
    height:14px;
    background:#001111;
    border:1px solid #00ffee33;
    margin:6px 0 15px 0;
}

.bar{
    height:100%;
    transition:width 0.4s ease;
}

.bar.hp{
    background:linear-gradient(90deg,#ff0033,#ff3366);
}

.bar.st{
    background:linear-gradient(90deg,#00ffee,#00ffaa);
}

/* 输入区 */
#inputArea{
    border-top:1px solid #00ffee22;
    padding:12px;
    display:flex;
    gap:10px;
}

#freeInput{
    flex:1;
    padding:10px;
    background:#000;
    color:#00ffee;
    border:1px solid #00ffee;
}

button{
    padding:10px 18px;
    background:transparent;
    border:1px solid #00ffee;
    color:#00ffee;
    cursor:pointer;
}

button:hover{
    background:#00ffee11;
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="main">

<div id="sidebar">
    <div>角色状态</div>
    <div id="statusPanel"></div>
</div>

<div id="content">
    <div id="log"></div>
</div>

<div id="rightbar">
    <div>任务</div>
    <div>暂无</div>
</div>

</div>

<div id="inputArea">
    <input id="freeInput" placeholder="输入你的行动..." />
    <button onclick="sendFree()">执行</button>
</div>

<script>

let turn=0;

let state={
    hp:80,
    stamina:65,
    reputation:15,
    money:200,
    time:"2077年2月14日 凌晨2:47",
    location:"夜之城"
};

let conversation=[{
role:"system",
content:`
你是赛博朋克2007沉浸式RPG主持人系统。
必须返回JSON：
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
规则：
- narrative 450-650字
- 必须有冲突
- 只返回JSON
`
}];

function updateHUD(){
    document.getElementById("hud").innerHTML=
        `回合 ${turn} ｜ 时间 ${state.time} ｜ 地点 ${state.location} ｜ 资金 €${state.money}`;
}

function updateSidebar(){
    document.getElementById("statusPanel").innerHTML=`
        <div>HP ${state.hp}</div>
        <div class="bar-container"><div class="bar hp" style="width:${state.hp}%"></div></div>
        <div>耐力 ${state.stamina}</div>
        <div class="bar-container"><div class="bar st" style="width:${state.stamina}%"></div></div>
        <div>声誉 ${state.reputation}</div>
        <div>资金 €${state.money}</div>
    `;
}

async function appendTurn(action){

    turn++;
    updateHUD();

    const block=document.createElement("div");
    block.className="turn";
    block.innerHTML=`<div class="choice">> ${action}</div>`;
    document.getElementById("log").appendChild(block);

    conversation.push({role:"user",content:action});

    const response=await fetch("http://localhost:3000/api/game",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:conversation})
    });

    const data=await response.json();

    if(!data || !data.choices){
        block.innerHTML+="<div style='color:red'>服务器异常</div>";
        return;
    }

    const reply=data.choices[0].message.content;
    let parsed;

    try{
        parsed=JSON.parse(reply);
    }catch{
        block.innerHTML+="<div style='color:red'>JSON解析失败</div>";
        return;
    }

    conversation.push({role:"assistant",content:reply});
    state=parsed.state;
    updateHUD();
    updateSidebar();

    const textDiv=document.createElement("div");
    block.appendChild(textDiv);

    for(let i=0;i<parsed.narrative.length;i++){
        textDiv.innerText+=parsed.narrative[i];
        document.getElementById("content").scrollTop=999999;
        await new Promise(r=>setTimeout(r,5));
    }

    parsed.options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>appendTurn(opt.text);
        block.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    appendTurn(val);
}

updateHUD();
updateSidebar();
appendTurn("生成角色与开场剧情");

</script>

</body>
</html>
