<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赛博朋克AI剧情系统</title>

<style>
body{
background:black;
color:#00ffcc;
font-family:monospace;
margin:0;
padding:20px;
}

#output{
white-space:pre-wrap;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:12px;
background:#111;
color:#00ffcc;
border:1px solid #00ffcc;
}

button{
margin-top:10px;
padding:10px 20px;
background:#00ffcc;
border:none;
cursor:pointer;
}

button:hover{
background:#00ccaa;
}
</style>
</head>

<body>

<h2>赛博朋克剧情终端</h2>

<div id="output">正在连接神经网络...</div>

<input id="playerInput" placeholder="输入你的行动..." />
<button onclick="sendMessage()">发送</button>

<script>

const API_KEY = "sk-946f5273a70f4995a3e41944f2e38717";

const SYSTEM_PROMPT = `
你现在是一个赛博朋克文字游戏主持人。
以下是世界设定：
{
  "世界观": "赛博朋克2007",
  "叙事风格": "冷峻、多线、沉浸式",
  "规则": "判定制"
}
游戏现在开始。
`;

let conversation = [
    { role: "system", content: SYSTEM_PROMPT }
];

async function startGame() {
    await callAI("开始生成角色与开场剧情。");
}

async function sendMessage(){
    const input = document.getElementById("playerInput").value;
    if(!input) return;

    document.getElementById("playerInput").value = "";
    await callAI(input);
}

async function callAI(message){

    conversation.push({ role: "user", content: message });

    const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "deepseek-chat",
            messages: conversation
        })
    });

    const data = await response.json();

    const reply = data.choices[0].message.content;

    conversation.push({ role: "assistant", content: reply });

    document.getElementById("output").innerText = reply;
}

startGame();

</script>

</body>
</html>
