<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博朋克沉浸式RPG</title>

<style>
body{
    background:black;
    color:#00ffcc;
    font-family:monospace;
    margin:0;
    padding:15px;
}

#container{
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
    font-size:18px;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.6;
    min-height:220px;
    font-size:14px;
}

.cursor{
    display:inline-block;
    width:8px;
    background:#00ffcc;
    margin-left:3px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

#loading{
    font-size:12px;
    margin:10px 0;
    color:#00ffaa;
    min-height:20px;
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    background:#00ffcc;
    border:none;
    font-family:monospace;
    font-size:14px;
}

button:disabled{
    background:#003333;
}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:14px;
}

#status{
    margin-top:15px;
    border-top:1px solid #00ffcc;
    padding-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div id="container">

<h2>赛博朋克 · 沉浸式RPG</h2>

<div id="narrative">正在连接夜之城主服务器...</div>

<div id="loading"></div>

<div id="buttons"></div>

<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>

<div id="status"></div>

</div>

<script>

const SYSTEM_PROMPT = `
你是一名赛博朋克世界的沉浸式RPG主持人。
必须只返回JSON：
{
  "narrative":"",
  "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
  "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
规则：
- 第二人称
- 强沉浸感
- 400-600字
- 每轮3选项
- 只返回JSON
`;

let conversation = [
    { role:"system", content:SYSTEM_PROMPT }
];

function disableButtons(state){
    document.querySelectorAll("button").forEach(btn=>{
        btn.disabled = state;
    });
}

function startLoading(){
    disableButtons(true);
    const loading = document.getElementById("loading");
    let dots = 0;

    return setInterval(()=>{
        dots = (dots+1)%4;
        loading.innerText = "AI正在生成剧情" + ".".repeat(dots);
    },500);
}

function stopLoading(interval){
    clearInterval(interval);
    document.getElementById("loading").innerText = "";
    disableButtons(false);
}

function typeWriter(text, element, speed=15){
    return new Promise(resolve=>{
        element.innerHTML = "";
        let i=0;

        const cursor = document.createElement("span");
        cursor.className="cursor";

        function typing(){
            if(i<text.length){
                element.innerHTML = text.substring(0,i+1);
                element.appendChild(cursor);
                i++;
                element.scrollTop = element.scrollHeight;
                setTimeout(typing,speed);
            }else{
                cursor.remove();
                resolve();
            }
        }
        typing();
    });
}

async function startGame(){
    await callAI("生成角色与开场剧情。");
}

async function callAI(message){

    conversation.push({role:"user",content:message});
    const loadingInterval = startLoading();

    try{
        const response = await fetch("/api/game",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                model:"deepseek-chat",
                messages:conversation
            })
        });

        const data = await response.json();
        stopLoading(loadingInterval);

        if(!data.choices){
            document.getElementById("narrative").innerText =
                "服务器异常："+JSON.stringify(data,null,2);
            return;
        }

        const reply = data.choices[0].message.content;

        let parsed;
        try{
            parsed = JSON.parse(reply);
        }catch(e){
            document.getElementById("narrative").innerText =
                "JSON解析失败："+reply;
            return;
        }

        conversation.push({role:"assistant",content:reply});
        await renderGame(parsed);

    }catch(error){
        stopLoading(loadingInterval);
        document.getElementById("narrative").innerText =
            "连接服务器失败："+error.message;
    }
}

async function renderGame(data){

    const narrativeEl = document.getElementById("narrative");
    await typeWriter(data.narrative,narrativeEl,12);

    const buttonsDiv = document.getElementById("buttons");
    buttonsDiv.innerHTML="";

    data.options.forEach(option=>{
        const btn=document.createElement("button");
        btn.innerText=option.id+". "+option.text;
        btn.onclick=()=>callAI(option.text);
        buttonsDiv.appendChild(btn);
    });

    document.getElementById("status").innerHTML=`
时间: ${data.state.time}<br>
地点: ${data.state.location}<br><br>
生命值: ${data.state.hp}<br>
耐力: ${data.state.stamina}<br>
声誉: ${data.state.reputation}<br>
资金: ${data.state.money}
`;
}

function sendFree(){
    const text=document.getElementById("freeInput").value;
    if(!text)return;
    document.getElementById("freeInput").value="";
    callAI(text);
}

startGame();

</script>
</body>
</html>
