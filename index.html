<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00ffcc;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* 顶部HUD */
#hud{
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:13px;
}

/* 主体布局 */
#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 左侧角色面板 */
#sidebar{
    width:260px;
    border-right:1px solid #003333;
    padding:15px;
    background:#0a0a0a;
    overflow-y:auto;
}

.panel-title{
    font-weight:bold;
    margin-top:15px;
    margin-bottom:5px;
    border-bottom:1px solid #003333;
    padding-bottom:3px;
}

.stat{
    margin:4px 0;
}

/* 中间剧情区域 */
#content{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

/* 回合 */
.turn{
    margin-bottom:25px;
    border-left:3px solid #00ffcc;
    padding-left:12px;
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

/* 底部输入区 */
#inputArea{
    border-top:1px solid #003333;
    padding:10px;
    display:flex;
    gap:10px;
}

#freeInput{
    flex:1;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

button{
    padding:10px 15px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    cursor:pointer;
}
button:hover{
    background:#003333;
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="main">

    <!-- 左侧角色状态 -->
    <div id="sidebar">
        <div class="panel-title">角色状态</div>
        <div id="statusPanel"></div>

        <div class="panel-title">技能</div>
        <div>街头生存 Lv2</div>
        <div>枪械精通 Lv2</div>
        <div>黑客技术 Lv1</div>

        <div class="panel-title">装备</div>
        <div>神经链接义体</div>
        <div>廉价手枪（12发）</div>
    </div>

    <!-- 中间剧情 -->
    <div id="content">
        <div id="log"></div>
    </div>

</div>

<div id="inputArea">
    <input id="freeInput" placeholder="输入你的行动..." />
    <button onclick="sendFree()">执行</button>
</div>

<script>

/* === 状态 === */

let state = {
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城"
};

let turn = 0;

/* === HUD更新 === */

function updateHUD(){
    document.getElementById("hud").innerHTML =
        `回合 ${turn} ｜ 时间 ${state.time} ｜ 地点 ${state.location} ｜ 资金 €${state.money}`;
}

/* === 左侧状态更新 === */

function updateSidebar(){
    document.getElementById("statusPanel").innerHTML = `
        <div class="stat">HP: ${state.hp}</div>
        <div class="stat">耐力: ${state.stamina}</div>
        <div class="stat">声誉: ${state.reputation}</div>
        <div class="stat">资金: ${state.money}</div>
    `;
}

/* === 添加回合 === */

async function addTurn(text){

    turn++;
    updateHUD();
    updateSidebar();

    const block = document.createElement("div");
    block.className = "turn";

    block.innerHTML = `<div class="choice">> ${text}</div>`;

    document.getElementById("log").appendChild(block);
    document.getElementById("content").scrollTop = 999999;
}

/* === 测试 === */

updateHUD();
updateSidebar();
addTurn("生成角色与开场剧情");

</script>

</body>
</html>
