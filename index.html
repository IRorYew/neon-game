<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00ffcc;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HUD */
#hud{
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:13px;
}

/* 主体 */
#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 左侧 */
#sidebar{
    width:260px;
    border-right:1px solid #003333;
    padding:15px;
    background:#0a0a0a;
    overflow-y:auto;
}

.panel-title{
    font-weight:bold;
    margin-top:15px;
    margin-bottom:5px;
    border-bottom:1px solid #003333;
    padding-bottom:3px;
}

.stat{
    margin:4px 0;
}

/* 剧情区 */
#content{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.turn{
    margin-bottom:25px;
    border-left:3px solid #00ffcc;
    padding-left:12px;
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

/* 输入区 */
#inputArea{
    border-top:1px solid #003333;
    padding:10px;
    display:flex;
    gap:10px;
}

#freeInput{
    flex:1;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

button{
    padding:10px 15px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    cursor:pointer;
}
button:hover{
    background:#003333;
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="main">

<div id="sidebar">
    <div class="panel-title">角色状态</div>
    <div id="statusPanel"></div>
</div>

<div id="content">
    <div id="log"></div>
</div>

</div>

<div id="inputArea">
    <input id="freeInput" placeholder="输入你的行动..." />
    <button onclick="sendFree()">执行</button>
</div>

<script>

let turn = 0;

let state = {
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城"
};

let conversation = [{
role:"system",
content:`
你是赛博朋克2007沉浸式RPG主持人系统。
必须返回JSON：
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
规则：
- narrative 450-650字
- 必须有冲突
- 必须包含时间地点
- 只返回JSON
`
}];

/* 更新HUD */
function updateHUD(){
    document.getElementById("hud").innerHTML =
        `回合 ${turn} ｜ 时间 ${state.time} ｜ 地点 ${state.location} ｜ 资金 €${state.money}`;
}

/* 更新侧栏 */
function updateSidebar(){
    document.getElementById("statusPanel").innerHTML = `
        <div class="stat">HP: ${state.hp}</div>
        <div class="stat">耐力: ${state.stamina}</div>
        <div class="stat">声誉: ${state.reputation}</div>
        <div class="stat">资金: ${state.money}</div>
    `;
}

/* 添加回合 */
async function appendTurn(action){

    turn++;
    updateHUD();

    const block = document.createElement("div");
    block.className="turn";

    block.innerHTML=`<div class="choice">> ${action}</div>`;
    document.getElementById("log").appendChild(block);

    conversation.push({role:"user",content:action});

    const response = await fetch("http://localhost:3000/api/game",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:conversation})
    });

    const data = await response.json();

    if(!data.choices){
        block.innerHTML += "<div>服务器错误："+JSON.stringify(data)+"</div>";
        return;
    }

    const reply = data.choices[0].message.content;

    let parsed;
    try{
        parsed = JSON.parse(reply);
    }catch(e){
        block.innerHTML += "<div>JSON错误："+reply+"</div>";
        return;
    }

    conversation.push({role:"assistant",content:reply});

    state = parsed.state;
    updateHUD();
    updateSidebar();

    const narrativeDiv = document.createElement("div");
    block.appendChild(narrativeDiv);

    for(let i=0;i<parsed.narrative.length;i++){
        narrativeDiv.innerText += parsed.narrative[i];
        document.getElementById("content").scrollTop = 999999;
        await new Promise(r=>setTimeout(r,5));
    }

    parsed.options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>appendTurn(opt.text);
        block.appendChild(btn);
    });
}

/* 自由输入 */
function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    appendTurn(val);
}

/* 初始化 */
updateHUD();
updateSidebar();
appendTurn("生成角色与开场剧情");

</script>

</body>
</html>
