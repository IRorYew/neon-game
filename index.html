<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赛博朋克启动协议</title>

<style>
body{
background:black;
color:#00ffcc;
font-family:monospace;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
padding:20px;
}

button{
background:#00ffcc;
color:black;
border:none;
padding:15px 25px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#00ccaa;
}
</style>

</head>
<body>

<h2>赛博朋克启动协议</h2>
<p>点击按钮复制规则并进入 DeepSeek</p>

<button onclick="startGame()">启动游戏</button>

<script>

const gameData = `{
  "角色设定卡": {
    "系统": {
      "世界观": "赛博朋克2007",
      "题材": "赛博朋克/反乌托邦/硬核科幻",
      "叙事风格": "冷峻、多线、沉浸式、写实主义",
      "核心机制": "判定制",
      "死亡规则": "生命值归零即游戏结束"
    }
  }
}`;

function startGame(){
    navigator.clipboard.writeText(gameData).then(function(){
        window.open("https://chat.deepseek.com", "_blank");
        alert("内容已复制，请在 DeepSeek 中粘贴并发送开始游戏。");
    });
}

</script>

</body>
</html>
