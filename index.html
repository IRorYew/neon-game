<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#hud{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
    z-index:1000;
}

#container{
    padding:80px 15px 40px;
    max-width:800px;
    margin:auto;
}

.turn{
    margin-top:25px;
    border-left:3px solid #00ffcc;
    padding-left:12px;
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}
</style>
</head>
<body>

<div id="hud">系统初始化中...</div>

<div id="container">
<div id="log"></div>
<div id="buttons"></div>
<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>
<button onclick="resetGame()">重置存档</button>
</div>

<script>

/* =========================
   全局状态
========================= */

let turn = 0;

let state = {
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城"
};

let conversation = [
{
role:"system",
content:`
你是赛博朋克2007沉浸式RPG主持人系统。

必须返回JSON格式：
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}

规则：
- narrative必须450-650字
- 必须有视觉/声音/气味描写
- 必须标明时间与地点
- 每轮必须有冲突或风险
- 世界会变化
- NPC会主动行动
- 不得解释规则
- 只返回JSON
`
}
];

/* =========================
   存档
========================= */

function saveGame(){
    localStorage.setItem("rpg_save", JSON.stringify({
        turn,
        state,
        log: document.getElementById("log").innerHTML,
        conversation
    }));
}

function loadGame(){
    const save = localStorage.getItem("rpg_save");
    if(save){
        const data = JSON.parse(save);
        turn = data.turn;
        state = data.state;
        conversation = data.conversation;
        document.getElementById("log").innerHTML = data.log;
        updateHUD();
        return true;
    }
    return false;
}

function resetGame(){
    localStorage.removeItem("rpg_save");
    location.reload();
}

/* =========================
   HUD
========================= */

function updateHUD(){
    document.getElementById("hud").innerHTML = `
回合: ${turn} ｜ 时间: ${state.time} ｜ 地点: ${state.location}
<br>
HP:${state.hp} ST:${state.stamina} REP:${state.reputation} $:${state.money}
`;
}

/* =========================
   AI调用
========================= */

async function appendTurn(action){

    turn++;
    updateHUD();

    const log = document.getElementById("log");

    const turnBlock = document.createElement("div");
    turnBlock.className="turn";

    const title = document.createElement("div");
    title.innerHTML=`<strong>—— 第 ${turn} 回合 ——</strong>`;
    turnBlock.appendChild(title);

    const choice = document.createElement("div");
    choice.className="choice";
    choice.innerText="> 你选择了: "+action;
    turnBlock.appendChild(choice);

    const narrativeBlock=document.createElement("div");
    turnBlock.appendChild(narrativeBlock);

    log.appendChild(turnBlock);

    conversation.push({role:"user",content:action});

    const response = await fetch("http://localhost:3000/api/game",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:conversation})
    });

    const data = await response.json();

    const reply = data.choices[0].message.content;

    let parsed;
    try{
        parsed = JSON.parse(reply);
    }catch(e){
        narrativeBlock.innerText="AI格式错误："+reply;
        return;
    }

    conversation.push({role:"assistant",content:reply});

    state = parsed.state;
    updateHUD();

    for(let i=0;i<parsed.narrative.length;i++){
        narrativeBlock.innerText+=parsed.narrative[i];
        window.scrollTo(0,document.body.scrollHeight);
        await new Promise(r=>setTimeout(r,5));
    }

    renderOptions(parsed.options);
    saveGame();
}

/* =========================
   选项
========================= */

function renderOptions(options){
    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";
    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>appendTurn(opt.text);
        btnDiv.appendChild(btn);
    });
}

/* =========================
   自由输入
========================= */

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    appendTurn(val);
}

/* =========================
   初始化
========================= */

if(!loadGame()){
    appendTurn("生成角色与开场剧情");
}

</script>
</body>
</html>
