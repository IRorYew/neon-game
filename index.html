<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博朋克沉浸式RPG</title>

<style>
body{
    background:black;
    color:#00ffcc;
    font-family:monospace;
    margin:0;
    padding:15px;
}

#container{
    max-width:700px;
    margin:auto;
}

h2{
    font-size:20px;
    text-align:center;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.6;
    margin-bottom:15px;
    min-height:220px;
    font-size:14px;
}

button{
    display:block;
    width:100%;
    padding:14px;
    margin-top:8px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-family:monospace;
    font-size:14px;
}

button:disabled{
    background:#003333;
    cursor:not-allowed;
}

button:hover{
    background:#00ccaa;
}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:14px;
}

#status{
    margin-top:15px;
    border-top:1px solid #00ffcc;
    padding-top:10px;
    font-size:13px;
}

#loading{
    margin-top:10px;
    height:20px;
    font-size:12px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div id="container">
<h2>赛博朋克 · 沉浸式RPG</h2>

<div id="narrative">正在连接夜之城主服务器...</div>

<div id="loading"></div>

<div id="buttons"></div>

<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>

<div id="status"></div>
</div>

<script>

const SYSTEM_PROMPT = `
你是一名赛博朋克世界的沉浸式RPG主持人。
⚠️ 你必须只返回 JSON，不得返回任何解释或额外文本。
格式严格：
{
  "narrative": "",
  "state": { "hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":"" },
  "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
沉浸规则：
- 第二人称
- 感官描写
- 时间地点必须变化
- narrative 400-600字
- 每轮必须3个选项
- 只返回JSON
`;

let conversation = [
    { role: "system", content: SYSTEM_PROMPT }
];

let loadingInterval = null;

function startLoading(){
    const loadingDiv = document.getElementById("loading");
    let dots = 0;
    disableButtons(true);

    loadingInterval = setInterval(()=>{
        dots = (dots + 1) % 6;
        loadingDiv.innerText = "连接神经网络中" + ".".repeat(dots);
    }, 400);
}

function stopLoading(){
    clearInterval(loadingInterval);
    document.getElementById("loading").innerText = "";
    disableButtons(false);
}

function disableButtons(state){
    document.querySelectorAll("button").forEach(btn=>{
        btn.disabled = state;
    });
}

async function startGame(){
    await callAI("生成角色与开场剧情。");
}

async function callAI(message){

    conversation.push({ role: "user", content: message });

    startLoading();

    try {

        const response = await fetch("/api/game", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: conversation
            })
        });

        const data = await response.json();

        stopLoading();

        if (!data.choices) {
            document.getElementById("narrative").innerText =
                "服务器异常：\n" + JSON.stringify(data, null, 2);
            return;
        }

        const reply = data.choices[0].message.content;

        let parsed;

        try {
            parsed = JSON.parse(reply);
        } catch (e) {
            document.getElementById("narrative").innerText =
                "JSON解析失败：\n" + reply;
            return;
        }

        renderGame(parsed);

        conversation.push({ role: "assistant", content: reply });

    } catch (error){
        stopLoading();
        document.getElementById("narrative").innerText =
            "连接服务器失败：\n" + error.message;
    }
}

function renderGame(data){

    document.getElementById("narrative").innerText = data.narrative;

    const buttonsDiv = document.getElementById("buttons");
    buttonsDiv.innerHTML = "";

    data.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option.id + ". " + option.text;
        btn.onclick = () => callAI(option.text);
        buttonsDiv.appendChild(btn);
    });

    document.getElementById("status").innerHTML = `
时间: ${data.state.time}<br>
地点: ${data.state.location}<br><br>
生命值: ${data.state.hp}<br>
耐力: ${data.state.stamina}<br>
声誉: ${data.state.reputation}<br>
资金: ${data.state.money}
`;
}

function sendFree(){
    const text = document.getElementById("freeInput").value;
    if(!text) return;
    document.getElementById("freeInput").value = "";
    callAI(text);
}

startGame();

</script>

</body>
</html>
