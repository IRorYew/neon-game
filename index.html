<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · 主持人系统V1</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#hud{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
}

#container{
    padding:70px 15px 20px;
    max-width:800px;
    margin:auto;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.7;
    min-height:240px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    opacity:0;
    transform:translateY(10px);
    animation:slideIn 0.4s forwards;
}

@keyframes slideIn{
    to{opacity:1;transform:translateY(0);}
}

button:disabled{opacity:0.5;}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

#loading{
    font-size:12px;
    color:#00ffaa;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="hud">系统初始化中...</div>

<div id="container">
<div id="narrative">正在构建夜之城数据流...</div>
<div id="loading"></div>
<div id="buttons"></div>
<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>
</div>

<script>

/* ===============================
   职业级主持人内核Prompt
================================ */

const SYSTEM_PROMPT = `
你是赛博朋克2007沉浸式RPG主持人系统。

【绝对规则】
1. 只能返回JSON。
2. narrative必须450-650字。
3. 必须包含视觉、声音、气味。
4. 必须标明时间与地点。
5. 每轮必须发生冲突或风险。
6. NPC必须主动行动。
7. 行动必须消耗时间或资源。
8. 不得解释规则。
9. 不得写总结句。

【输出格式】
{
 "narrative": "",
 "state": {
   "hp":0,
   "stamina":0,
   "reputation":0,
   "money":0,
   "time":"",
   "location":""
 },
 "options":[
   {"id":1,"text":""},
   {"id":2,"text":""},
   {"id":3,"text":""}
 ]
}
`;

/* ===============================
   当前先使用本地AI模拟器
================================ */

let state={
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城 · 沃森区 · 数据黑市"
};

function generateNarrative(action){

    state.time="21:"+Math.floor(Math.random()*60).toString().padStart(2,"0");
    state.stamina-=5;

    return `
时间 ${state.time}
地点 ${state.location}

雨水顺着破裂的霓虹灯壳滴落，在油渍积水里泛出紫红色光晕。远处改装引擎低沉轰鸣，空气混着臭氧与廉价合成酒精的刺鼻味。

你刚刚选择：${action}

巷道另一端传来金属义体关节转动的清脆声响。一个带红色光学义眼的男人正通过神经频道低声汇报你的位置。与此同时，本地频道闪过一条新闻推送——沃森区两分钟前发生帮派冲突，霓虹帮正在封锁三个街区。

时间在流逝。离交货还剩不到40分钟。

你意识到芯片外壳温度升高，也许有人在远程追踪。

一辆悬浮摩托突然从街口掠过，溅起冷雨。驾驶者明显在寻找某个人。

城市正在收紧。
`;
}

function generateOptions(){
    return [
        {id:1,text:"快速转移至高处建筑（调用属性：反应，难度：8，消耗：耐力-10，潜在奖励：脱离追踪）"},
        {id:2,text:"尝试黑入芯片追踪信号源（调用属性：智力，难度：7，消耗：时间-30分钟，潜在奖励：掌握敌方位置）"},
        {id:3,text:"混入街边人群降低存在感（调用属性：镇定，难度：6，消耗：时间-15分钟，潜在奖励：规避正面冲突）"}
    ];
}

function fakeAI(action){
    return {
        narrative: generateNarrative(action),
        state:{...state},
        options:generateOptions()
    };
}

/* ===============================
   UI逻辑
================================ */

function disableAll(state){
    document.querySelectorAll("button").forEach(b=>b.disabled=state);
}

function startLoading(){
    const el=document.getElementById("loading");
    let dots=0;
    return setInterval(()=>{
        dots=(dots+1)%4;
        el.innerText="系统推演中"+".".repeat(dots);
    },400);
}

function stopLoading(interval){
    clearInterval(interval);
    document.getElementById("loading").innerText="";
}

async function typeWriter(text){
    const el=document.getElementById("narrative");
    el.innerText="";
    for(let i=0;i<text.length;i++){
        el.innerText+=text[i];
        await new Promise(r=>setTimeout(r,6));
    }
}

async function callAI(action){

    disableAll(true);
    const loadingInterval=startLoading();
    await new Promise(r=>setTimeout(r,1200));

    const data=fakeAI(action);

    stopLoading(loadingInterval);
    await typeWriter(data.narrative);
    renderGame(data);
    disableAll(false);
}

function renderGame(data){

    document.getElementById("hud").innerHTML=`
时间: ${data.state.time} ｜ 地点: ${data.state.location}
<br>
HP:${data.state.hp} ST:${data.state.stamina} REP:${data.state.reputation} $:${data.state.money}
`;

    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";

    data.options.forEach((opt,index)=>{
        const btn=document.createElement("button");
        btn.style.animationDelay=(index*0.1)+"s";
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>callAI(opt.text);
        btnDiv.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    callAI(val);
}

callAI("生成角色与开场剧情。");

</script>
</body>
</html>
