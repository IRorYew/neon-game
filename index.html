<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00ffcc;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* HUD */
#hud{
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:13px;
    box-shadow:0 0 10px #00ffcc55;
}

/* 主体 */
#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 左侧面板 */
#sidebar{
    width:260px;
    background:#0a0a0a;
    border-right:1px solid #003333;
    padding:15px;
    overflow-y:auto;
}

/* 右侧面板 */
#rightbar{
    width:260px;
    background:#0a0a0a;
    border-left:1px solid #003333;
    padding:15px;
    overflow-y:auto;
}

/* 剧情区 */
#content{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

/* 回合 */
.turn{
    margin-bottom:25px;
    border-left:3px solid #00ffcc;
    padding-left:12px;
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

/* 面板标题 */
.panel-title{
    font-weight:bold;
    margin-top:15px;
    margin-bottom:8px;
    border-bottom:1px solid #003333;
    padding-bottom:3px;
    text-shadow:0 0 6px #00ffcc;
}

/* 能量条 */
.bar-container{
    width:100%;
    height:12px;
    background:#111;
    border:1px solid #003333;
    margin:6px 0 12px 0;
}

.bar{
    height:100%;
    background:linear-gradient(90deg,#00ffcc,#00ffaa);
    transition:width 0.4s ease;
    box-shadow:0 0 8px #00ffcc;
}

.bar.hp{
    background:linear-gradient(90deg,#ff0033,#ff3366);
    box-shadow:0 0 8px #ff0033;
}

/* 输入区 */
#inputArea{
    border-top:1px solid #003333;
    padding:10px;
    display:flex;
    gap:10px;
}

#freeInput{
    flex:1;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

button{
    padding:10px 15px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    cursor:pointer;
    transition:all 0.2s;
}

button:hover{
    background:#003333;
    box-shadow:0 0 8px #00ffcc;
}

/* 扫描线 */
.scanline{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:#00ffcc33;
    animation:scan 5s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="main">

<div id="sidebar">
    <div class="panel-title">角色状态</div>
    <div id="statusPanel"></div>

    <div class="panel-title">技能</div>
    <div>街头生存 Lv2</div>
    <div>枪械精通 Lv2</div>
    <div>黑客技术 Lv1</div>

    <div class="panel-title">装备</div>
    <div>神经链接义体</div>
    <div>廉价手枪（12发）</div>
</div>

<div id="content">
    <div id="log"></div>
</div>

<div id="rightbar">
    <div class="panel-title">任务</div>
    <div>暂无</div>

    <div class="panel-title">NPC关系</div>
    <div>暂无联系人</div>
</div>

</div>

<div id="inputArea">
    <input id="freeInput" placeholder="输入你的行动..." />
    <button onclick="sendFree()">执行</button>
</div>

<div class="scanline"></div>

<script>

let turn = 0;

let state = {
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城"
};

let conversation = [{
role:"system",
content:`
你是赛博朋克2007沉浸式RPG主持人系统。
必须返回JSON：
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
规则：
- narrative 450-650字
- 必须有冲突
- 必须包含时间地点
- 只返回JSON
`
}];

/* HUD */
function updateHUD(){
    document.getElementById("hud").innerHTML =
        `回合 ${turn} ｜ 时间 ${state.time} ｜ 地点 ${state.location} ｜ 资金 €${state.money}`;
}

/* 左侧状态 */
function updateSidebar(){
    const hpPercent = Math.max(0,state.hp);
    const staminaPercent = Math.max(0,state.stamina);

    document.getElementById("statusPanel").innerHTML = `
        <div>HP ${state.hp}</div>
        <div class="bar-container">
            <div class="bar hp" style="width:${hpPercent}%"></div>
        </div>

        <div>耐力 ${state.stamina}</div>
        <div class="bar-container">
            <div class="bar" style="width:${staminaPercent}%"></div>
        </div>

        <div>声誉 ${state.reputation}</div>
        <div>资金 €${state.money}</div>
    `;
}

/* 添加回合 */
async function appendTurn(action){

    turn++;
    updateHUD();

    const block = document.createElement("div");
    block.className="turn";
    block.innerHTML=`<div class="choice">> ${action}</div>`;
    document.getElementById("log").appendChild(block);

    conversation.push({role:"user",content:action});

    const response = await fetch("http://localhost:3000/api/game",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:conversation})
    });

    const data = await response.json();

    if(!data || !data.choices){
        block.innerHTML += "<div style='color:red'>服务器返回异常</div>";
        return;
    }

    const reply = data.choices[0].message.content;

    let parsed;
    try{
        parsed = JSON.parse(reply);
    }catch(e){
        block.innerHTML += "<div style='color:red'>JSON解析失败</div>";
        return;
    }

    conversation.push({role:"assistant",content:reply});

    state = parsed.state;
    updateHUD();
    updateSidebar();

    const narrativeDiv = document.createElement("div");
    block.appendChild(narrativeDiv);

    for(let i=0;i<parsed.narrative.length;i++){
        narrativeDiv.innerText += parsed.narrative[i];
        document.getElementById("content").scrollTop = 999999;
        await new Promise(r=>setTimeout(r,5));
    }

    parsed.options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>appendTurn(opt.text);
        block.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    appendTurn(val);
}

updateHUD();
updateSidebar();
appendTurn("生成角色与开场剧情");

</script>

</body>
</html>
