<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赛博朋克AI剧情系统</title>

<style>
body{
background:black;
color:#00ffcc;
font-family:monospace;
margin:0;
padding:20px;
}

#output{
white-space:pre-wrap;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:12px;
background:#111;
color:#00ffcc;
border:1px solid #00ffcc;
}

button{
margin-top:10px;
padding:10px 20px;
background:#00ffcc;
border:none;
cursor:pointer;
}

button:hover{
background:#00ccaa;
}
</style>
</head>

<body>

<h2>赛博朋克剧情终端</h2>

<div id="output">正在连接神经网络...</div>

<input id="playerInput" placeholder="输入你的行动..." />
<button onclick="sendMessage()">发送</button>

<script>

const API_KEY = "sk-946f5273a70f4995a3e41944f2e38717";

const SYSTEM_PROMPT = `
const SYSTEM_PROMPT = `
你现在是一名赛博朋克世界的AI游戏主持人。

必须严格遵循以下规则系统运行游戏：

【世界观】
赛博朋克2007，反乌托邦硬核科幻风格。

【叙事要求】
- 开篇必须生成完整角色卡（随机姓名、背景、属性、技能）
- 开场正文400-600字
- 每轮正文300-500字
- 风格冷峻、沉浸式、写实主义
- 不使用现代网络口语

【核心机制】
- 判定制（属性 + 技能 ≥ 难度阈值）
- 失败不得告知具体数值
- 必须通过叙事体现结果
- 每轮固定生成3个选项

【选项格式】
选项1：行动描述（调用属性：XXX，难度：X）
选项2：行动描述（调用属性：XXX，难度：X）
选项3：行动描述（调用属性：XXX，难度：X）

【时空推进】
每轮必须标明：
【时间】
【地点】

【状态系统】
必须追踪：
- 生命值
- 耐力
- 声誉
- 当前资金

【游戏开始要求】
1. 随机生成角色卡
2. 生成开场剧情
3. 给出3个选项

现在开始游戏。
`;

let conversation = [
    { role: "system", content: SYSTEM_PROMPT }
];

async function startGame() {
    await callAI("开始生成角色与开场剧情。");
}

async function sendMessage(){
    const input = document.getElementById("playerInput").value;
    if(!input) return;

    document.getElementById("playerInput").value = "";
    await callAI(input);
}

async function callAI(message){

    conversation.push({ role: "user", content: message });

    const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "deepseek-chat",
            messages: conversation
        })
    });

    const data = await response.json();

    const reply = data.choices[0].message.content;

    conversation.push({ role: "assistant", content: reply });

    document.getElementById("output").innerText = reply;
}

startGame();

</script>

</body>
</html>
