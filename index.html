<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · RPG引擎V2</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#hud{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.95);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
    z-index:1000;
}

#container{
    padding:80px 15px 30px;
    max-width:800px;
    margin:auto;
}

.turn{
    margin-top:25px;
    border-left:3px solid #00ffcc;
    padding-left:10px;
}

.choice{
    color:#00ffaa;
    margin:10px 0;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}
</style>
</head>
<body>

<div id="hud"></div>

<div id="container">
<div id="log"></div>
<div id="buttons"></div>
<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>
<button onclick="resetGame()">重置存档</button>
</div>

<script>

/* ======================
   核心状态
====================== */

let turn = 0;

let state = {
    hp:70,
    stamina:46,
    reputation:20,
    money:1270,
    time:"21:15",
    location:"夜之城 · 沃森区"
};

/* ======================
   本地存档系统
====================== */

function saveGame(){
    localStorage.setItem("rpg_save", JSON.stringify({
        turn,
        state,
        log: document.getElementById("log").innerHTML
    }));
}

function loadGame(){
    const save = localStorage.getItem("rpg_save");
    if(save){
        const data = JSON.parse(save);
        turn = data.turn;
        state = data.state;
        document.getElementById("log").innerHTML = data.log;
        updateHUD();
        return true;
    }
    return false;
}

function resetGame(){
    localStorage.removeItem("rpg_save");
    location.reload();
}

/* ======================
   HUD
====================== */

function updateHUD(){
    document.getElementById("hud").innerHTML = `
回合: ${turn} ｜ 时间: ${state.time} ｜ 地点: ${state.location}
<br>
HP:${state.hp} ST:${state.stamina} REP:${state.reputation} $:${state.money}
`;
}

/* ======================
   剧情生成器（模拟）
====================== */

function generateNarrative(action){

    state.stamina -= 5;
    state.time = "21:" + Math.floor(Math.random()*60).toString().padStart(2,"0");

    return `
时间 ${state.time}
地点 ${state.location}

霓虹在雨水中扭曲，空气混着臭氧与金属粉尘的味道。
你刚刚选择：${action}

街角的监控无人机悬停片刻，红色扫描线掠过墙面。
本地频道闪过一条帮派内部加密广播。

城市并未停下。

远处引擎声再次逼近。
`;
}

function generateOptions(){
    return [
        {id:1,text:"寻找高处掩体（调用属性：反应，难度：8）"},
        {id:2,text:"黑入附近监控网络（调用属性：智力，难度：7）"},
        {id:3,text:"混入人群降低存在感（调用属性：镇定，难度：6）"}
    ];
}

/* ======================
   日志系统
====================== */

async function appendTurn(action){

    turn++;
    updateHUD();

    const log = document.getElementById("log");

    const turnBlock = document.createElement("div");
    turnBlock.className = "turn";

    const title = document.createElement("div");
    title.innerHTML = `<strong>—— 第 ${turn} 回合 ——</strong>`;
    turnBlock.appendChild(title);

    const choice = document.createElement("div");
    choice.className="choice";
    choice.innerText="> 你选择了: "+action;
    turnBlock.appendChild(choice);

    const narrative = document.createElement("div");
    turnBlock.appendChild(narrative);

    log.appendChild(turnBlock);

    const text = generateNarrative(action);

    for(let i=0;i<text.length;i++){
        narrative.innerText+=text[i];
        window.scrollTo(0,document.body.scrollHeight);
        await new Promise(r=>setTimeout(r,5));
    }

    renderOptions(generateOptions());
    saveGame();
}

/* ======================
   选项系统
====================== */

function renderOptions(options){
    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";
    options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>appendTurn(opt.text);
        btnDiv.appendChild(btn);
    });
}

/* ======================
   自由输入
====================== */

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;

    if(val==="状态"){
        alert(JSON.stringify(state,null,2));
        return;
    }

    document.getElementById("freeInput").value="";
    appendTurn(val);
}

/* ======================
   初始化
====================== */

if(!loadGame()){
    appendTurn("生成角色与开场剧情");
}

</script>
</body>
</html>
