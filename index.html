<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赛博朋克AI RPG系统</title>

<style>
body{
    background:black;
    color:#00ffcc;
    font-family:monospace;
    margin:0;
    padding:20px;
}

#game{
    max-width:900px;
    margin:auto;
}

#output{
    white-space:pre-wrap;
    line-height:1.6;
    margin-bottom:20px;
}

button{
    display:block;
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-family:monospace;
}

button:hover{
    background:#00ccaa;
}

#status{
    border-top:1px solid #00ffcc;
    margin-top:20px;
    padding-top:10px;
}
</style>
</head>

<body>

<div id="game">
<h2>赛博朋克AI RPG系统</h2>
<div id="output">正在初始化世界...</div>
<div id="buttons"></div>
<div id="status"></div>
</div>

<script>

const SYSTEM_PROMPT = `
你是一名赛博朋克世界的AI游戏主持人。

⚠️ 你必须始终只返回 JSON。

格式严格如下：

{
  "narrative": "剧情正文",
  "state": {
    "hp": 数字,
    "stamina": 数字,
    "reputation": 数字,
    "money": 数字
  },
  "options": [
    { "id": 1, "text": "选项描述" },
    { "id": 2, "text": "选项描述" },
    { "id": 3, "text": "选项描述" }
  ]
}

规则：
- 开场生成角色和剧情
- 每轮给3个选项
- narrative 400-600字
- 不得返回任何额外说明
- 不得使用代码块
- 只返回 JSON

现在开始游戏。
`;

let conversation = [
    { role: "system", content: SYSTEM_PROMPT }
];

async function startGame(){
    await callAI("开始生成角色与开场剧情。");
}

async function callAI(message){

    conversation.push({ role: "user", content: message });

    try {

        const response = await fetch("/api/game", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: conversation
            })
        });

        const data = await response.json();

        if (!data.choices) {
            document.getElementById("output").innerText =
                "服务器异常：\n" + JSON.stringify(data, null, 2);
            return;
        }

        const reply = data.choices[0].message.content;

        let parsed;

        try {
            parsed = JSON.parse(reply);
        } catch (e) {
            document.getElementById("output").innerText =
                "JSON解析失败：\n" + reply;
            return;
        }

        renderGame(parsed);

        conversation.push({ role: "assistant", content: reply });

    } catch (error){
        document.getElementById("output").innerText =
            "连接服务器失败：\n" + error.message;
    }
}

function renderGame(data){

    document.getElementById("output").innerText = data.narrative;

    const buttonsDiv = document.getElementById("buttons");
    buttonsDiv.innerHTML = "";

    data.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option.id + ". " + option.text;
        btn.onclick = () => callAI(option.text);
        buttonsDiv.appendChild(btn);
    });

    const statusDiv = document.getElementById("status");

    statusDiv.innerHTML = `
生命值: ${data.state.hp}  
耐力: ${data.state.stamina}  
声誉: ${data.state.reputation}  
资金: ${data.state.money}
`;
}

startGame();

</script>

</body>
</html>
