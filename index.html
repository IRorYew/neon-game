<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI沉浸式RPG</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#hud{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
}

#container{
    padding:70px 15px 20px;
    max-width:750px;
    margin:auto;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.6;
    min-height:220px;
    position:relative;
}

.scanline{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffcc33;
    animation:scan 3s linear infinite;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    opacity:0;
    transform:translateY(10px);
    animation:slideIn 0.4s forwards;
}

@keyframes slideIn{
    to{opacity:1;transform:translateY(0);}
}

button:disabled{opacity:0.5;}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

#loading{
    font-size:12px;
    color:#00ffaa;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="hud">系统初始化中...</div>

<div id="container">

<div id="narrative">
<div class="scanline"></div>
正在连接夜之城主脑...
</div>

<div id="loading"></div>

<div id="buttons"></div>

<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>

</div>

<script>

let state={
    hp:100,
    stamina:100,
    reputation:0,
    money:500,
    time:"22:10",
    location:"夜之城 · 贫民区"
};

function randomNarrative(action){
    return `时间 ${state.time} ｜ 地点 ${state.location}

霓虹灯在雨水中扭曲成破碎的光影。空气里混着臭氧与廉价酒精的味道。远处机械义肢运转的金属声此起彼伏。

你刚刚选择：${action}

一辆改装悬浮摩托从街角掠过，溅起冷雨。街边的流浪黑客盯着你，像在评估你的价值。

城市正在记录你的每一次选择。`;
}

function generateOptions(){
    return [
        {id:1,text:"走进昏暗的小巷"},
        {id:2,text:"联系地下黑客"},
        {id:3,text:"查看个人终端数据"}
    ];
}

function fakeAI(action){

    state.stamina-=5;
    state.time="22:"+Math.floor(Math.random()*60).toString().padStart(2,"0");
    state.money+=Math.floor(Math.random()*50);

    return {
        narrative: randomNarrative(action),
        state: {...state},
        options: generateOptions()
    };
}

function disableAll(state){
    document.querySelectorAll("button").forEach(b=>b.disabled=state);
}

function startLoading(){
    const el=document.getElementById("loading");
    let dots=0;
    return setInterval(()=>{
        dots=(dots+1)%4;
        el.innerText="AI正在生成剧情"+".".repeat(dots);
    },400);
}

function stopLoading(interval){
    clearInterval(interval);
    document.getElementById("loading").innerText="";
}

async function typeWriter(text){
    const el=document.getElementById("narrative");
    el.innerText="";
    for(let i=0;i<text.length;i++){
        el.innerText+=text[i];
        await new Promise(r=>setTimeout(r,8));
    }
}

async function callAI(action){

    disableAll(true);
    const loadingInterval=startLoading();

    await new Promise(r=>setTimeout(r,1500)); // 模拟AI延迟

    const data=fakeAI(action);

    stopLoading(loadingInterval);

    await typeWriter(data.narrative);
    renderGame(data);

    disableAll(false);
}

function renderGame(data){

    document.getElementById("hud").innerHTML=`
时间: ${data.state.time} ｜ 地点: ${data.state.location}
<br>
HP:${data.state.hp} ST:${data.state.stamina} REP:${data.state.reputation} $:${data.state.money}
`;

    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";

    data.options.forEach((opt,index)=>{
        const btn=document.createElement("button");
        btn.style.animationDelay=(index*0.1)+"s";
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>callAI(opt.text);
        btnDiv.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    callAI(val);
}

callAI("生成角色与开场剧情。");

</script>
</body>
</html>
