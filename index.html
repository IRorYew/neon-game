<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赛博朋克AI剧情系统</title>

<style>
body{
    background:black;
    color:#00ffcc;
    font-family:monospace;
    margin:0;
    padding:20px;
}

#output{
    white-space:pre-wrap;
    margin-bottom:20px;
    line-height:1.6;
    min-height:300px;
}

input{
    width:100%;
    padding:12px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
    margin-top:10px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#00ccaa;
}
</style>
</head>

<body>

<h2>赛博朋克剧情终端</h2>

<div id="output">正在连接神经网络...</div>

<input id="playerInput" placeholder="输入你的行动..." />
<button onclick="sendMessage()">发送</button>

<script>

const SYSTEM_PROMPT = `
你现在是一名赛博朋克世界的AI游戏主持人。

必须严格遵循以下规则系统运行游戏：

【世界观】
赛博朋克2007，反乌托邦硬核科幻风格。

【叙事要求】
- 开篇必须生成完整角色卡
- 开场正文400-600字
- 每轮正文300-500字
- 风格冷峻、沉浸式

【核心机制】
- 判定制（属性 + 技能 ≥ 难度阈值）
- 失败不得告知具体数值
- 每轮固定生成3个选项

【选项格式】
选项1：行动描述（调用属性：XXX，难度：X）
选项2：行动描述（调用属性：XXX，难度：X）
选项3：行动描述（调用属性：XXX，难度：X）

现在开始游戏。
`;

let conversation = [
    { role: "system", content: SYSTEM_PROMPT }
];

async function startGame() {
    await callAI("开始生成角色与开场剧情。");
}

async function sendMessage(){
    const input = document.getElementById("playerInput").value;
    if(!input) return;

    document.getElementById("playerInput").value = "";
    await callAI(input);
}

async function callAI(message){

    conversation.push({ role: "user", content: message });

    try {

        const response = await fetch("/api/game", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: conversation
            })
        });

        const data = await response.json();

        if (!data.choices) {
            document.getElementById("output").innerText =
                "服务器返回异常：\n" + JSON.stringify(data, null, 2);
            return;
        }

        const reply = data.choices[0].message.content;

        conversation.push({ role: "assistant", content: reply });

        document.getElementById("output").innerText = reply;

    } catch (error) {

        document.getElementById("output").innerText =
            "连接服务器失败：\n" + error.message;
    }
}

startGame();

</script>

</body>
</html>
