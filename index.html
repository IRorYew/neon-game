<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI RPG</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle at top,#0a0f14,#000);
    color:#00ffee;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* 强霓虹HUD */
#hud{
    padding:8px;
    font-size:14px;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid #00ffee;
    text-shadow:0 0 8px #00ffee;
    box-shadow:0 0 20px #00ffee33;
}

/* 主布局 */
#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 玻璃拟态面板 */
#sidebar,#rightbar{
    width:260px;
    padding:15px;
    backdrop-filter:blur(8px);
    background:rgba(0,255,255,0.03);
    border-right:1px solid #00ffee22;
    box-shadow:0 0 20px #00ffee22 inset;
    overflow-y:auto;
}

#rightbar{
    border-right:none;
    border-left:1px solid #00ffee22;
}

/* 剧情区 */
#content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

/* 回合 */
.turn{
    margin-bottom:25px;
    border-left:4px solid #00ffee;
    padding-left:12px;
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.choice{
    color:#00ffaa;
    margin:10px 0;
    text-shadow:0 0 6px #00ffaa;
}

/* 面板标题 */
.panel-title{
    font-weight:bold;
    margin-top:15px;
    margin-bottom:8px;
    border-bottom:1px solid #00ffee33;
    padding-bottom:3px;
    text-shadow:0 0 8px #00ffee;
}

/* 能量条 */
.bar-container{
    width:100%;
    height:14px;
    background:#001111;
    border:1px solid #00ffee33;
    margin:6px 0 15px 0;
    overflow:hidden;
}

.bar{
    height:100%;
    transition:width 0.4s ease;
    box-shadow:0 0 10px currentColor;
}

.bar.hp{
    background:linear-gradient(90deg,#ff0033,#ff3366);
    color:#ff0033;
    animation:pulseHP 1.5s infinite alternate;
}

.bar.st{
    background:linear-gradient(90deg,#00ffee,#00ffaa);
    color:#00ffee;
}

@keyframes pulseHP{
    from{box-shadow:0 0 8px #ff0033;}
    to{box-shadow:0 0 20px #ff0033;}
}

/* 输入区 */
#inputArea{
    border-top:1px solid #00ffee22;
    padding:12px;
    display:flex;
    gap:10px;
}

#freeInput{
    flex:1;
    padding:10px;
    background:#000;
    color:#00ffee;
    border:1px solid #00ffee;
    box-shadow:0 0 10px #00ffee22 inset;
}

/* 赛博按钮 */
button{
    padding:10px 18px;
    background:transparent;
    border:1px solid #00ffee;
    color:#00ffee;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:all 0.2s;
}

button:hover{
    background:#00ffee11;
    box-shadow:0 0 15px #00ffee;
}

/* 扫描线 */
.scanline{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:#00ffee33;
    animation:scan 6s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="main">

<div id="sidebar">
    <div class="panel-title">角色状态</div>
    <div id="statusPanel"></div>
</div>

<div id="content">
    <div id="log"></div>
</div>

<div id="rightbar">
    <div class="panel-title">任务</div>
    <div>暂无任务</div>
    <div class="panel-title">NPC关系</div>
    <div>暂无联系人</div>
</div>

</div>

<div id="inputArea">
    <input id="freeInput" placeholder="输入你的行动..." />
    <button onclick="sendFree()">执行</button>
</div>

<div class="scanline"></div>

<script>
let turn=0;
let state={hp:80,stamina:65,reputation:15,money:200,time:"2077年2月14日 凌晨2:47",location:"夜之城"};

function updateHUD(){
    document.getElementById("hud").innerHTML=
        `回合 ${turn} ｜ 时间 ${state.time} ｜ 地点 ${state.location} ｜ 资金 €${state.money}`;
}

function updateSidebar(){
    document.getElementById("statusPanel").innerHTML=`
        <div>HP ${state.hp}</div>
        <div class="bar-container">
            <div class="bar hp" style="width:${state.hp}%"></div>
        </div>
        <div>耐力 ${state.stamina}</div>
        <div class="bar-container">
            <div class="bar st" style="width:${state.stamina}%"></div>
        </div>
        <div>声誉 ${state.reputation}</div>
        <div>资金 €${state.money}</div>
    `;
}

updateHUD();
updateSidebar();
</script>

</body>
</html>
