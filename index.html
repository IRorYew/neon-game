<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · 沉浸式AI RPG</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow-x:hidden;
}

/* HUD浮动状态栏 */
#hud{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
    z-index:1000;
}

#container{
    padding:70px 15px 20px 15px;
    max-width:750px;
    margin:auto;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.6;
    min-height:200px;
    font-size:14px;
    position:relative;
}

/* 黑客扫描线 */
.scanline{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffcc33;
    animation:scan 3s linear infinite;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

.cursor{
    display:inline-block;
    width:8px;
    background:#00ffcc;
    margin-left:3px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0}
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    font-family:monospace;
    opacity:0;
    transform:translateY(10px);
    animation:slideIn 0.4s forwards;
}

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

button:disabled{
    opacity:0.5;
}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

#loading{
    font-size:12px;
    color:#00ffaa;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="hud">连接中...</div>

<div id="container">

<div id="narrative">
<div class="scanline"></div>
正在连接夜之城主脑...
</div>

<div id="loading"></div>

<div id="buttons"></div>

<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>

</div>

<script>

const SYSTEM_PROMPT = `
你是一名赛博朋克世界的沉浸式RPG主持人。
必须只返回JSON:
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
沉浸规则:
- 第二人称
- 强感官描写
- 400-600字
- 每轮3选项
- 只返回JSON
`;

let conversation = [
    {role:"system",content:SYSTEM_PROMPT}
];

function disableAll(state){
    document.querySelectorAll("button").forEach(b=>b.disabled=state);
}

function playTypeSound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type="square";
    osc.frequency.setValueAtTime(800,ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.02);
}

async function streamAI(message){

    conversation.push({role:"user",content:message});
    disableAll(true);

    const response = await fetch("/api/game",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            model:"deepseek-chat",
            stream:true,
            messages:conversation
        })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder("utf-8");

    let buffer="";
    let fullText="";

    document.getElementById("loading").innerText="AI正在生成剧情...";

    while(true){
        const {done,value} = await reader.read();
        if(done) break;

        buffer += decoder.decode(value,{stream:true});
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for(const line of lines){
            if(line.startsWith("data:")){
                const json = line.replace("data:","").trim();
                if(json==="[DONE]") break;

                try{
                    const parsed = JSON.parse(json);
                    const delta = parsed.choices?.[0]?.delta?.content;
                    if(delta){
                        fullText += delta;
                        await typeStream(delta);
                    }
                }catch{}
            }
        }
    }

    document.getElementById("loading").innerText="";
    disableAll(false);

    try{
        const parsed = JSON.parse(fullText);
        conversation.push({role:"assistant",content:fullText});
        renderGame(parsed);
    }catch(e){
        console.error("JSON解析失败",fullText);
    }
}

async function typeStream(text){
    const el = document.getElementById("narrative");
    for(let i=0;i<text.length;i++){
        el.innerText += text[i];
        playTypeSound();
        el.scrollTop = el.scrollHeight;
        await new Promise(r=>setTimeout(r,10));
    }
}

function renderGame(data){

    document.getElementById("hud").innerHTML=`
时间: ${data.state.time} ｜ 地点: ${data.state.location}
<br>
HP:${data.state.hp} ST:${data.state.stamina} REP:${data.state.reputation} $:${data.state.money}
`;

    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";

    data.options.forEach((opt,index)=>{
        const btn=document.createElement("button");
        btn.style.animationDelay=(index*0.1)+"s";
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>streamAI(opt.text);
        btnDiv.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val) return;
    document.getElementById("freeInput").value="";
    streamAI(val);
}

streamAI("生成角色与开场剧情。");

</script>
</body>
</html>
