<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜之城 · AI沉浸式RPG</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow-x:hidden;
}

#hud{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid #00ffcc;
    padding:8px;
    font-size:12px;
}

#container{
    padding:70px 15px 20px;
    max-width:750px;
    margin:auto;
}

#narrative{
    white-space:pre-wrap;
    line-height:1.6;
    min-height:220px;
    position:relative;
}

.scanline{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffcc33;
    animation:scan 3s linear infinite;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#001f1f;
    border:1px solid #00ffcc;
    color:#00ffcc;
    opacity:0;
    transform:translateY(10px);
    animation:slideIn 0.4s forwards;
}

@keyframes slideIn{
    to{opacity:1;transform:translateY(0);}
}

button:disabled{opacity:0.5;}

#freeInput{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
}

#loading{
    font-size:12px;
    color:#00ffaa;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="hud">系统初始化中...</div>

<div id="container">

<div id="narrative">
<div class="scanline"></div>
正在连接夜之城主脑...
</div>

<div id="loading"></div>

<div id="buttons"></div>

<input id="freeInput" placeholder="输入你的自由行动..." />
<button onclick="sendFree()">执行行动</button>

</div>

<script>

const SYSTEM_PROMPT = `
你是一名赛博朋克世界的沉浸式RPG主持人。
必须只返回JSON:
{
 "narrative":"",
 "state":{"hp":0,"stamina":0,"reputation":0,"money":0,"time":"","location":""},
 "options":[{"id":1,"text":""},{"id":2,"text":""},{"id":3,"text":""}]
}
规则:
- 第二人称
- 强沉浸感
- 400-600字
- 每轮3选项
- 只返回JSON
`;

let conversation = [
    {role:"system",content:SYSTEM_PROMPT}
];

function disableAll(state){
    document.querySelectorAll("button").forEach(b=>b.disabled=state);
}

function startLoading(){
    const el=document.getElementById("loading");
    let dots=0;
    return setInterval(()=>{
        dots=(dots+1)%4;
        el.innerText="AI正在生成剧情"+".".repeat(dots);
    },400);
}

function stopLoading(interval){
    clearInterval(interval);
    document.getElementById("loading").innerText="";
}

async function typeWriter(text){
    const el=document.getElementById("narrative");
    el.innerText="";
    for(let i=0;i<text.length;i++){
        el.innerText+=text[i];
        await new Promise(r=>setTimeout(r,8));
    }
}

async function callAI(message){

    conversation.push({role:"user",content:message});
    disableAll(true);
    const loadingInterval=startLoading();

    try{
        const response=await fetch("http://localhost:3000/api/game",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                messages:conversation
            })
        });

        const data=await response.json();
        stopLoading(loadingInterval);

        const reply=data.choices[0].message.content;
        const parsed=JSON.parse(reply);

        conversation.push({role:"assistant",content:reply});

        await typeWriter(parsed.narrative);
        renderGame(parsed);

    }catch(err){
        stopLoading(loadingInterval);
        document.getElementById("narrative").innerText="错误："+err.message;
    }

    disableAll(false);
}

function renderGame(data){

    document.getElementById("hud").innerHTML=`
时间: ${data.state.time} ｜ 地点: ${data.state.location}
<br>
HP:${data.state.hp} ST:${data.state.stamina} REP:${data.state.reputation} $:${data.state.money}
`;

    const btnDiv=document.getElementById("buttons");
    btnDiv.innerHTML="";

    data.options.forEach((opt,index)=>{
        const btn=document.createElement("button");
        btn.style.animationDelay=(index*0.1)+"s";
        btn.innerText=opt.id+". "+opt.text;
        btn.onclick=()=>callAI(opt.text);
        btnDiv.appendChild(btn);
    });
}

function sendFree(){
    const val=document.getElementById("freeInput").value;
    if(!val)return;
    document.getElementById("freeInput").value="";
    callAI(val);
}

callAI("生成角色与开场剧情。");

</script>
</body>
</html>
